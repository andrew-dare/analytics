services:
  kafka:
    image: apache/kafka:3.8.0
    hostname: kafka
    container_name: kafka-analytics-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:19092,CONTROLLER://kafka:19093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:19093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data

  postgres:
    image: postgres:16-alpine
    container_name: kafka-analytics-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      POSTGRES_DB: analytics
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-analytics-kafka-exporter
    command: ["--kafka.server=kafka:19092"]
    restart: unless-stopped
    depends_on:
      - kafka

  prometheus:
    image: prom/prometheus:latest
    container_name: kafka-analytics-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: kafka-analytics-grafana
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  kafka-console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    container_name: kafka-analytics-console
    ports:
      - "8082:8080"
    environment:
      KAFKA_BROKERS: kafka:19092
    depends_on:
      - kafka

  pgweb:
    image: sosedoff/pgweb:latest
    container_name: kafka-analytics-pgweb
    ports:
      - "8081:8081"
    environment:
      PGWEB_DATABASE_URL: postgres://analytics:analytics@postgres:5432/analytics?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    container_name: kafka-analytics-backend
    ports:
      - "4000:4000"
    environment:
      KAFKA_BROKER: kafka:19092
      DATABASE_URL: postgres://analytics:analytics@postgres:5432/analytics
      PORT: 4000
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy

volumes:
  kafka-data:
  postgres-data:
  prometheus-data:
  grafana-data:
